<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Wetter Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-sky-50 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-xl w-full bg-white rounded-2xl shadow-lg p-6">
    <h1 class="text-3xl font-bold text-center mb-4 text-sky-700">
      Wetter Dashboard
    </h1>

    <p class="text-center text-gray-600 mb-4">
      Gib eine Stadt ein und erhalte aktuelle Wetterdaten.
    </p>

    <div class="flex gap-2 mb-4">
      <input
        id="cityInput"
        class="flex-1 border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400"
        placeholder="z.B. Berlin, Paris, Crailsheim"
      />
      <button
        onclick="loadWeather()"
        class="bg-sky-600 hover:bg-sky-700 text-white px-4 py-2 rounded-lg"
      >
        Wetter
      </button>
    </div>

    <div id="status" class="text-sm text-gray-500 mb-2"></div>

    <div
      id="result"
      class="mt-4 border rounded-xl p-4 bg-sky-50 hidden"
    ></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
